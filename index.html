<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arthur Game</title>
<style>body{margin:0;overflow:hidden;}#info{position:absolute;top:10px;left:10px;color:white;background:rgba(0,0,0,0.5);padding:10px;border-radius:5px;}#inst{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:white;background:rgba(0,0,0,0.5);padding:10px;border-radius:5px;}</style>
</head>
<body>
<div id="info">WASD: Move | Mouse: Look</div>
<div id="inst">Click to start</div>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
const scene=new THREE.Scene();scene.background=new THREE.Color(0x87ceeb);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,5);camera.rotation.order='YXZ';
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xffffbb,0x080820,1));
const ground=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshStandardMaterial({color:0x228B22}));
ground.rotation.x=-Math.PI/2;scene.add(ground);
const colors=[0xff4444,0x44ff44,0x4444ff,0xffff44,0xff44ff,0x44ffff];
for(let i=0;i<30;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshStandardMaterial({color:colors[i%6]}));m.position.set((Math.random()-.5)*40,.5,(Math.random()-.5)*40);scene.add(m);}
const keys={};let yaw=0,pitch=0,locked=false;
document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>keys[e.code]=false);
document.addEventListener('click',()=>renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===renderer.domElement;document.getElementById('inst').style.display=locked?'none':'block';});
document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*.002;pitch=Math.max(-1.5,Math.min(1.5,pitch-e.movementY*.002));});
const clock=new THREE.Clock();
(function animate(){requestAnimationFrame(animate);const d=clock.getDelta();
if(locked){const f=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));const r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
if(keys.KeyW)camera.position.addScaledVector(f,5*d);if(keys.KeyS)camera.position.addScaledVector(f,-5*d);
if(keys.KeyA)camera.position.addScaledVector(r,-5*d);if(keys.KeyD)camera.position.addScaledVector(r,5*d);}
camera.rotation.set(pitch,yaw,0);renderer.render(scene,camera);})();
</script>
</body>
</html>
